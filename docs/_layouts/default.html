<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <nav class="main-nav" role="navigation" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}" class="logo" aria-label="Syntagma Home">
            <span class="logo-icon">Σ</span>
            <span class="logo-text">Syntagma</span>
          </a>
          <button class="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation">
            <span class="hamburger"></span>
          </button>
          <ul id="nav-menu" class="nav-menu">
            {% for item in site.nav %}
              <li>
                <a href="{{ item.url | relative_url }}" class="{% if page.url == item.url or page.url contains item.url %}active{% endif %}">
                  {{ item.title }}
                </a>
              </li>
            {% endfor %}
          </ul>
        </nav>
      </div>
    </header>

    <main class="main-content" role="main">
      <div class="container">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; {{ site.time | date: "%Y" }} Syntagma. An Agentic Curriculum Lifecycle Management System for PES University.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var toggle = document.querySelector(".nav-toggle");
        var menu = document.getElementById("nav-menu");
        if (toggle && menu) {
          toggle.addEventListener("click", function () {
            var expanded = toggle.getAttribute("aria-expanded") === "true";
            toggle.setAttribute("aria-expanded", String(!expanded));
            menu.classList.toggle("open");
          });
        }

        document.querySelectorAll("code.language-mermaid").forEach(function (el) {
          var container = document.createElement("div");
          container.classList.add("mermaid");
          container.textContent = el.textContent;
          el.closest(".highlighter-rouge").replaceWith(container);
        });
        mermaid.initialize({ startOnLoad: true, theme: "base", themeVariables: {
          primaryColor: '#c45508',
          primaryTextColor: '#2d1b0e',
          primaryBorderColor: '#b85c0a',
          lineColor: '#8b4513',
          secondaryColor: '#fdf8f3',
          tertiaryColor: '#e8d5c4'
        }});
      });
    </script>
  </body>
</html>
