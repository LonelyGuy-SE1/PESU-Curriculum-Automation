title: Syntagma
description: An Agentic Curriculum Lifecycle Management System for PES University
theme: null
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
plugins:
  - jekyll-seo-tag
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
include:
  - assets

nav:
  - title: Home
    url: /
  - title: Architecture
    url: /architecture/
  - title: How It Works
    url: /how-it-works/
  - title: API Reference
    url: /api-reference/
  - title: Database Schema
    url: /database-schema/
  - title: Environment
    url: /environment/
  - title: Deployment
    url: /deployment/
  - title: Screenshots
    url: /screenshots/

collections:
  pages:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"